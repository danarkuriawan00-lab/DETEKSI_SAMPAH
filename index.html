<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EkoScan Adiwiyata - Pemilah Sampah AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f9f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h2 { color: #2e7d32; margin-bottom: 5px; }
        .info { color: #666; font-size: 14px; margin-bottom: 20px; }
        #webcam-container {
            margin: 20px auto;
            border: 5px solid #2e7d32;
            border-radius: 15px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #hasil-scan {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            min-width: 200px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* Efek warna dinamis untuk kategori */
        .ORGANIK { color: #ffffff; background-color: #4caf50 !important; }
        .ANORGANIK { color: #ffffff; background-color: #2196f3 !important; }
        .B3 { color: #ffffff; background-color: #f44336 !important; }
    </style>
</head>
<body>

    <h2>🌱 EkoScan Adiwiyata 🌱</h2>
    <p class="info">Arahkan kamera belakang HP Anda tepat ke arah objek sampah.</p>
    
    <div id="webcam-container"></div>
    
    <div id="hasil-scan">Memuat Kamera...</div>

<script type="text/javascript">
    // GANTI LINK DI BAWAH INI dengan link model online Anda dari Teachable Machine
    // Contoh: "https://teachablemachine.withgoogle.com/models/KODE_ANDA/"
    const URL = "./my_model/"; 

    let model, webcam, hasilContainer, maxPredictions;

    // Fungsi otomatis berjalan saat halaman dibuka
    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // Memuat model AI
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // PENGATURAN KAMERA HP: 
        // flip = false (agar tulisan tidak terbalik)
        // facingMode: "environment" (memaksa HP pakai kamera belakang)
        const flip = false; 
        webcam = new tmImage.Webcam(250, 250, flip); 
        await webcam.setup({ facingMode: "environment" }); 
        
        await webcam.play();
        window.requestAnimationFrame(loop);

        // Pasang kamera ke layar
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        hasilContainer = document.getElementById("hasil-scan");
        hasilContainer.innerHTML = "Siap Scan Sampah";
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        let kategoriTerpilih = "";
        let skorTertinggi = 0;

        // Mencari prediksi dengan persentase keyakinan tertinggi
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > skorTertinggi) {
                skorTertinggi = prediction[i].probability;
                kategoriTerpilih = prediction[i].className;
            }
        }

        // Tampilkan hasil hanya jika AI yakin di atas 50% (0.50)
        if (skorTertinggi > 0.50) {
            hasilContainer.innerHTML = kategoriTerpilih;
            // Memberikan warna background dinamis (hijau/biru/merah) sesuai nama class di CSS
            hasilContainer.className = kategoriTerpilih.toUpperCase();
        } else {
            hasilContainer.innerHTML = "Mendeteksi...";
            hasilContainer.className = "";
        }
    }

    // Jalankan sistem secara otomatis
    window.onload = init;
</script>
</body>
</html>
